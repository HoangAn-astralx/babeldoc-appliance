name: Build BabelDOC ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            xorriso \
            squashfs-tools \
            debootstrap \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Setup build directory
        run: |
          sudo mkdir -p /tmp/lb-build
          sudo cp -r lb-config/config /tmp/lb-build/

      - name: lb config
        working-directory: /tmp/lb-build
        run: |
          sudo lb config \
            --distribution jammy \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main restricted universe multiverse" \
            --bootappend-live "boot=live components quiet splash" \
            --linux-packages "linux-image linux-headers" \
            --bootloader "grub-efi" \
            --memtest none

      - name: Build ISO
        working-directory: /tmp/lb-build
        run: |
          sudo lb build 2>&1 | tee /tmp/build.log

      - name: Kiểm tra kết quả
        run: |
          ls -lh /tmp/lb-build/*.iso 2>/dev/null || echo "Không có ISO"
          tail -30 /tmp/build.log

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: babeldoc-ubuntu-iso
          path: /tmp/lb-build/*.iso
          retention-days: 7

      - name: Upload build log (luôn upload)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
