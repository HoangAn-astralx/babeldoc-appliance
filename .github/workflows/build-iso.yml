name: Build BabelDOC ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            xorriso \
            squashfs-tools \
            debootstrap \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-common \
            mtools \
            isolinux \
            syslinux-common

      - name: Setup build directory
        run: |
          sudo mkdir -p /tmp/lb-build
          sudo cp -r lb-config/config /tmp/lb-build/

      - name: Inject .env secrets
        run: |
          sudo tee /tmp/lb-build/config/includes.chroot/opt/babeldoc-web/.env > /dev/null << EOF
          TRANSLATION_API_KEY=${{ secrets.TRANSLATION_API_KEY }}
          TRANSLATION_MODEL=${{ vars.TRANSLATION_MODEL || 'Qwen/Qwen3-30B-A3B-Instruct-2507-FP8' }}
          TRANSLATION_BASE_URL=${{ secrets.TRANSLATION_BASE_URL }}
          OCR_MODEL=${{ vars.OCR_MODEL || 'deepseek-ai/DeepSeek-OCR-2' }}
          RETAIN_ENABLED=${{ vars.RETAIN_ENABLED || '1' }}
          RETAIN_API_KEY=${{ secrets.RETAIN_API_KEY }}
          RETAIN_OCR_PROVIDER=${{ vars.RETAIN_OCR_PROVIDER || 'paddle' }}
          RETAIN_PADDLE_TOKEN=${{ secrets.RETAIN_PADDLE_TOKEN }}
          CUSTOM_SYSTEM_PROMPT=/no_think You are a professional, authentic machine translation engine.
          DEFAULT_LANG_IN=${{ vars.DEFAULT_LANG_IN || 'en' }}
          DEFAULT_LANG_OUT=${{ vars.DEFAULT_LANG_OUT || 'vi' }}
          QPS=${{ vars.QPS || '4' }}
          API_KEYS=${{ secrets.API_KEYS }}
          NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}
          EOF

      - name: lb config
        working-directory: /tmp/lb-build
        run: |
          sudo lb config \
            --distribution jammy \
            --architectures amd64 \
            --binary-images iso \
            --archive-areas "main restricted universe multiverse" \
            --bootappend-live "boot=live components quiet splash" \
            --linux-packages "linux-image linux-headers" \
            --bootloader grub-efi \
            --debian-installer false \
            --memtest none

      - name: Build ISO
        working-directory: /tmp/lb-build
        run: |
          sudo lb build 2>&1 | tee /tmp/build.log

      - name: Rebuild ISO with GRUB bootloader (grub-mkrescue)
        run: |
          ISO=$(ls /tmp/lb-build/*.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "FAIL: No ISO found"
            exit 1
          fi
          echo "Source ISO: $ISO"
          # Extract ISO content
          mkdir -p /tmp/iso-src
          sudo mount -o loop "$ISO" /mnt
          sudo cp -a /mnt/. /tmp/iso-src/
          sudo umount /mnt
          sudo rm -f "$ISO"
          # Create GRUB config for live boot
          mkdir -p /tmp/iso-src/boot/grub
          printf '%s\n' \
            'search --set=root --file /casper/vmlinuz' \
            'set default=0' \
            'set timeout=3' \
            '' \
            'menuentry "BabelDOC Live" {' \
            '  linux /casper/vmlinuz boot=live components quiet splash' \
            '  initrd /casper/initrd.img' \
            '}' \
            '' \
            'menuentry "BabelDOC Live (Safe Graphics)" {' \
            '  linux /casper/vmlinuz boot=live components nomodeset quiet splash' \
            '  initrd /casper/initrd.img' \
            '}' > /tmp/iso-src/boot/grub/grub.cfg
          # Build hybrid ISO with grub-mkrescue
          sudo grub-mkrescue -o /tmp/lb-build/babeldoc-bootable.iso /tmp/iso-src -- -V "BabelDOC-Live" 2>&1

      - name: Verify ISO
        run: |
          ISO=$(ls /tmp/lb-build/babeldoc-bootable.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "FAIL: No bootable ISO found"
            exit 1
          fi
          echo "ISO: $ISO"
          ls -lh "$ISO"
          echo "File type:"
          file "$ISO"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: babeldoc-ubuntu-iso
          path: /tmp/lb-build/babeldoc-bootable.iso
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
