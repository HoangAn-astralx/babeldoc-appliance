name: Build BabelDOC ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            xorriso \
            squashfs-tools \
            debootstrap \
            mtools

      - name: Setup build directory
        run: |
          sudo mkdir -p /tmp/lb-build
          sudo cp -r lb-config/config /tmp/lb-build/

      - name: Install isohybrid into chroot (Debian syslinux-utils)
        run: |
          set -ex
          cd /tmp
          curl -sSL -o syslinux-utils.deb \
            "https://ftp.debian.org/debian/pool/main/s/syslinux/syslinux-utils_6.04~git20190206.bf6db5b4+dfsg1-3+b1_amd64.deb"
          mkdir -p su-extract
          dpkg-deb -x syslinux-utils.deb su-extract
          sudo mkdir -p /tmp/lb-build/config/includes.chroot/usr/local/bin
          sudo cp su-extract/usr/bin/isohybrid /tmp/lb-build/config/includes.chroot/usr/local/bin/
          echo "isohybrid placed in includes.chroot:"
          ls -la /tmp/lb-build/config/includes.chroot/usr/local/bin/

      - name: Inject .env secrets
        run: |
          sudo tee /tmp/lb-build/config/includes.chroot/opt/babeldoc-web/.env > /dev/null << EOF
          TRANSLATION_API_KEY=${{ secrets.TRANSLATION_API_KEY }}
          TRANSLATION_MODEL=${{ vars.TRANSLATION_MODEL || 'Qwen/Qwen3-30B-A3B-Instruct-2507-FP8' }}
          TRANSLATION_BASE_URL=${{ secrets.TRANSLATION_BASE_URL }}
          OCR_MODEL=${{ vars.OCR_MODEL || 'deepseek-ai/DeepSeek-OCR-2' }}
          RETAIN_ENABLED=${{ vars.RETAIN_ENABLED || '1' }}
          RETAIN_API_KEY=${{ secrets.RETAIN_API_KEY }}
          RETAIN_OCR_PROVIDER=${{ vars.RETAIN_OCR_PROVIDER || 'paddle' }}
          RETAIN_PADDLE_TOKEN=${{ secrets.RETAIN_PADDLE_TOKEN }}
          CUSTOM_SYSTEM_PROMPT=/no_think You are a professional, authentic machine translation engine.
          DEFAULT_LANG_IN=${{ vars.DEFAULT_LANG_IN || 'en' }}
          DEFAULT_LANG_OUT=${{ vars.DEFAULT_LANG_OUT || 'vi' }}
          QPS=${{ vars.QPS || '4' }}
          API_KEYS=${{ secrets.API_KEYS }}
          NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}
          EOF

      - name: lb config
        working-directory: /tmp/lb-build
        run: |
          sudo lb config \
            --distribution jammy \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --archive-areas "main restricted universe multiverse" \
            --bootappend-live "boot=live components quiet splash" \
            --linux-packages "linux-image linux-headers" \
            --bootloader "grub-efi" \
            --memtest none

      - name: Build ISO
        working-directory: /tmp/lb-build
        run: |
          sudo lb build 2>&1 | tee /tmp/build.log

      - name: Kiểm tra kết quả
        run: |
          ls -lh /tmp/lb-build/*.iso 2>/dev/null || echo "Không có ISO"
          tail -30 /tmp/build.log

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: babeldoc-ubuntu-iso
          path: /tmp/lb-build/*.iso
          retention-days: 7

      - name: Upload build log (luôn upload)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
